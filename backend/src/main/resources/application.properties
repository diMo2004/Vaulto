server.port=${PORT:8080}

spring.data.mongodb.uri=mongodb://localhost:27017/coupons_auth

# JWT Properties
app.jwt.access-secret=${JWT_ACCESS_SECRET:change_this_access_secret_to_something_very_secure}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:change_this_refresh_secret_to_something_very_secure}
app.jwt.access-expiration=900000
app.jwt.refresh-expiration=2592000000

# OAuth2 Properties
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Custom App Properties
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173
app.cookie.domain=${COOKIE_DOMAIN:localhost}
app.oauth2.success-redirect=${GOOGLE_SUCCESS_REDIRECT:http://localhost:5173/dashboard}
app.oauth2.failure-redirect=${GOOGLE_FAILURE_REDIRECT:http://localhost:5173}

# Twilio Properties
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:your_twilio_account_sid}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:your_twilio_auth_token}
app.twilio.from-number=${TWILIO_FROM_NUMBER:your_twilio_from_number}
