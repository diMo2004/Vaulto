name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-frontend:
    name: CI - Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vaulto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vaulto/package-lock.json

      - run: npm ci

      - name: Build
        env:
          CI: false
          REACT_APP_API_BASE: http://localhost:8080
        run: npm run build

  ci-spring-backend:
    name: CI - Spring Boot Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        env:
          JWT_ACCESS_SECRET: ci_access_secret_with_enough_length
          JWT_REFRESH_SECRET: ci_refresh_secret_with_enough_length
          GOOGLE_CLIENT_ID: ci-google-client-id
          GOOGLE_CLIENT_SECRET: ci-google-client-secret
          TWILIO_ACCOUNT_SID: ci-twilio-account-sid
          TWILIO_AUTH_TOKEN: ci-twilio-auth-token
          TWILIO_FROM_NUMBER: "+10000000000"
        run: mvn -B test

  ci-docker-builds:
    name: CI - Docker ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: paddleocr-service
            context: paddleocr-service
          - name: recommendation-service
            context: recommendation-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: vaulto/${{ matrix.service.name }}:ci
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  deploy-railway:
    name: Deploy - Railway
    runs-on: ubuntu-latest
    needs: [ci-spring-backend, ci-docker-builds]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up ./backend --path-as-root --service backend --detach

      - name: Deploy paddleocr-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up ./paddleocr-service --path-as-root --service paddleocr-service --detach

      - name: Deploy recommendation-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up ./recommendation-service --path-as-root --service recommendation-service --detach

  deploy-vercel:
    name: Deploy - Vercel Frontend
    runs-on: ubuntu-latest
    needs: [ci-frontend]
    environment: production
    defaults:
      run:
        working-directory: vaulto
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vaulto/package-lock.json

      - run: npm ci

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes
